<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1ME</title>
  <meta name="description" content="1ME is your digital twin in home, work, studying and hobbies." />
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="public-page">
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>

  <header class="public-header">
    <a class="brand" href="/" aria-label="1ME etusivu">
      <img src="/assets/logo.svg" alt="" class="brand-mark" />
      <span>1ME</span>
    </a>
  </header>

  <main class="public-main">
    <section class="public-hero" aria-labelledby="hero-title">
      <img src="/assets/logo.svg" alt="1ME logo" class="hero-logo" />
      <h1 id="hero-title" class="hero-title">
        Your digital twin in home, work,<br />
        studying and hobbies.
      </h1>
    </section>
  </main>

  <footer class="public-footer">
    <span>© <span id="year"></span> 1ME</span>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
