<svg xmlns="http://www.w3.org/2000/svg" width="563" height="466" viewBox="-6.75 31.75 562.5 465.5" aria-label="Symmetrinen vektoriversio mustilla viivoilla, rajattu pienemmillä marginaaleilla">
