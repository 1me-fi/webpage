    <line x1="52" y1="174" x2="497" y2="174" stroke="#000000" stroke-width="5"/>
    <polyline points="78 234 274.5 209 471 234" stroke="#000000" stroke-width="5"/>
    <polyline points="118 259 274.5 264 431 259" stroke="#000000" stroke-width="4"/>
    <polyline points="103 314 274.5 299 446 314" stroke="#000000" stroke-width="4"/>
    <polyline points="128 364 274.5 334 421 364" stroke="#000000" stroke-width="4"/>

